name: weather-alert-saint-chamond

on:
  schedule:
    - cron: "7 * * * *"
      timezone: "Europe/Paris"
  workflow_dispatch:

concurrency:
  group: weather-alert-saint-chamond
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather alert monitor
        env:
          OPEN_METEO_BASE_URL: https://api.open-meteo.com/v1/forecast
          OPEN_METEO_MODEL: best_match
          OPEN_METEO_TIMEOUT_SECONDS: "30"
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          ALERT_EMAIL_TO: vtndenis@gmail.com
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_BUSINESS_ACCOUNT_ID: ${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}
          WHATSAPP_RECIPIENT_NUMBER: "+33624018317"
          WHATSAPP_GRAPH_API_VERSION: "v25.0"
          WHATSAPP_TEMPLATE_NAME: "meteo_alerte_pluie_resume_v1"
          WHATSAPP_TEMPLATE_LANGUAGE: "fr_FR"
          WHATSAPP_TIMEOUT_SECONDS: "20"
          TARGET_DATE: 2026-04-11
          TARGET_TIMEZONE: Europe/Paris
          TARGET_LAT: "45.470463"
          TARGET_LON: "4.505748"
        run: python main.py
